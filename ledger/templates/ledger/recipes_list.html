{% extends 'ledger/base_ledger.html' %}
{% load static %}
    {% block content %}
    <h2>Recipes List</h2>
    <ul>
        {%for recipe in recipes%}
        <li><a href='{{recipe.get_link_string}}'>{{recipe.name}}</a></li>
        {%endfor%}
    </ul>
    <a href="{% url 'ledger:recipe_add' %}">Add new Recipe</a>
{% endblock %}
