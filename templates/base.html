<!DOCTYPE html>
<html lang="en">
    <head>
        <title>{%block title%}Recipe Book{%endblock%}</title>
        {%block styles%}{%endblock%}
    </head>
    <body>
        {%block header%}Recipe Book{%endblock%}
        <div id="content">
            {%block content%}{%endblock%}
        </div>
        {% if user.is_authenticated %}
                {%include 'registration/logout.html'%}
        {%else%}
                <a href="{%url 'login' %}"></a>
        {% endif %}
        {%block scripts%}{%endblock%}
    </body>
</html>
